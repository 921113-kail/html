<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First HTML Page</title>
    <style>
        /* 保留原有的 CSS 样式 */
        body {
            margin: 0;
            overflow: hidden;
        }
        video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            -webkit-filter: grayscale(20%);
            filter: grayscale(20%);
        }
        .intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: lightblue;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            animation: fadeOut 2s ease-in-out 3s forwards;
            will-change: opacity, visibility;
        }
        .intro h1 {
            font-family: 'Courier New', Courier, monospace;
            font-size: 3em;
            color: rgb(81, 193, 212);
            text-align: center;
            line-height: 1.5;
            margin: 20px 0;
        }
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-top: 20px;
        }
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
        .content {
            display: none;
            animation: fadeIn 1s ease-in-out forwards;
            will-change: opacity;
            text-align: center;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <!-- 开场动画 -->
    <div class="intro">
        <h1>欢迎来到我个人的HTML页面</h1>
        <img src="22.jpg" alt="alt" style="width: 100px; height: 100px; border-radius: 50%; margin-top: 20px;">
        <div class="loader"></div>
    </div>

    <!-- 背景视频 -->
    <video src="3.mp4" autoplay="autoplay" loop="loop" muted="muted"></video>

    <!-- 主内容 -->
    <div class="content">
        <h1>
            <span class="letter" style="animation-delay: 0s;">欢</span>
            <span class="letter" style="animation-delay: 0.2s;">迎</span>
            <span class="letter" style="animation-delay: 0.4s;">来</span>
            <span class="letter" style="animation-delay: 0.6s;">到</span>
            <span class="letter" style="animation-delay: 0.8s;">我</span>
            <span class="letter" style="animation-delay: 1s;">的</span>
            <span class="letter" style="animation-delay: 1.2s;">H</span>
            <span class="letter" style="animation-delay: 1.4s;">T</span>
            <span class="letter" style="animation-delay: 1.6s;">M</span>
            <span class="letter" style="animation-delay: 1.8s;">L</span>
            <span class="letter" style="animation-delay: 2s;">页</span>
            <span class="letter" style="animation-delay: 2.2s;">面</span>
        </h1>
    </div>

    <!-- 引用外部 JavaScript 文件 -->
    <script src="script.js"></script>
</body>
</html>
